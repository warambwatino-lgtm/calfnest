; CALFNEST edge node — ESP32-S3 with TensorFlow Lite for Microcontrollers.
; Library versions are PINNED for reproducible builds (AI4I C1).
[env:esp32-s3-devkitc-1]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@6.21.5
    knolleary/PubSubClient@2.8
    adafruit/Adafruit SHT31 Library@2.2.2
    bogde/HX711@0.7.5
    ; tflite-micro is vendored under firmware/lib/tflite-micro (pinned commit)
build_flags = -DCORE_DEBUG_LEVEL=2
